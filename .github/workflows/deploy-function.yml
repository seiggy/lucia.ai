name: Deploy Repo Stats Function

on:
  push:
    branches: [main]
    paths:
      - 'functions/repo-stats-function/**'
      - '.github/workflows/deploy-function.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_PATH: functions/repo-stats-function/RepoStatsFunction.csproj

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore $PROJECT_PATH

      - name: Build
        run: dotnet build $PROJECT_PATH --configuration Release --no-restore

      - name: Publish
        run: dotnet publish $PROJECT_PATH --configuration Release --no-build --output "$RUNNER_TEMP/repo-stats-publish"

      - name: Archive publish output
        run: |
          cd "$RUNNER_TEMP/repo-stats-publish"
          zip -r "$RUNNER_TEMP/repo-stats-function.zip" .

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group "${{ vars.AZURE_FUNCTIONAPP_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FUNCTIONAPP_NAME }}" \
            --src "$RUNNER_TEMP/repo-stats-function.zip"
